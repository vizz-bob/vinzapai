name: Build VinzapAI Installer

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r vinzapai-backend/requirements.txt
        pip install pyinstaller

    - name: Install Node dependencies
      run: |
        cd vinzapai-frontend
        npm install

    - name: Build React frontend
      run: |
        cd vinzapai-frontend
        npm run build

    - name: Copy frontend build to backend
      run: |
        xcopy vinzapai-frontend\build vinzapai-backend\frontend_build /E /I /Y

    - name: Collect static files
      run: |
        cd vinzapai-backend
        python manage.py collectstatic --noinput --settings=backend.settings_standalone

    - name: Build executable with PyInstaller
      run: |
        cd vinzapai-backend
        pyinstaller -y vinzapai_backend.spec

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Build installer
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O"dist" installer.iss

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: VinzapAI_Setup_Windows
        path: dist/VinzapAI_Setup.exe
        retention-days: 30
